<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-21TVKZ7NKB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-21TVKZ7NKB');

    <meta charset="UTF-8">
    <title>Perfect Blue | Shazily v3.1</title>
    <style>
        /* --- LAYOUT --- */
        :root { --accent: #00f2ff; --bg: #000105; }
        body { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'JetBrains Mono', monospace; color: #fff; }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; outline: none; }

        /* --- STAR WARS INTRO --- */
        #star-wars-intro {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 2500; pointer-events: none;
            opacity: 0; transition: opacity 2s ease-out;
        }
        #star-wars-intro.active { opacity: 1; }

        .crawl-text {
            font-family: "Impact", "Arial Black", sans-serif;
            font-weight: 900; color: #FFE81F; font-size: 5vw;
            text-align: center; letter-spacing: 2px; text-transform: uppercase;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0 0 20px #FFE81F;
            transform: perspective(400px) rotateX(25deg);
        }

        /* --- UI LAYER --- */
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none; }

        #fs-btn {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(0, 242, 255, 0.3);
            color: var(--accent); padding: 10px; border-radius: 4px;
            cursor: pointer; pointer-events: auto; font-size: 18px;
            transition: 0.2s;
        }
        #fs-btn:hover { background: rgba(0, 242, 255, 0.1); box-shadow: 0 0 15px var(--accent); }

        /* --- BOTTOM HINTS (REACTIVE) --- */
        #hints {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 30px; align-items: center; justify-content: center;
            width: 100%; pointer-events: none;
        }
        
        .hint-group {
            font-size: 10px; color: rgba(255, 255, 255, 0.3);
            letter-spacing: 4px; transition: all 0.2s ease; /* Faster transition for reactivity */
            text-shadow: none;
        }
        
        /* Active State (Solid Glow) */
        .hint-group.active {
            color: #fff;
            text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
            transform: scale(1.1);
            opacity: 1.0;
        }

        .icon { font-size: 16px; vertical-align: middle; margin-right: 8px; }

        /* --- SIGNATURE --- */
        #signature {
            position: absolute; bottom: 30px; left: 30px;
            font-size: 10px; color: rgba(0, 242, 255, 0.4);
            pointer-events: auto;
        }
        a { color: inherit; text-decoration: none; border-bottom: 1px solid rgba(0, 242, 255, 0.2); transition: 0.3s; }
        a:hover { color: var(--accent); border-color: var(--accent); }

        /* --- HUD --- */
        #hud-right {
            position: absolute; bottom: 30px; right: 30px; text-align: right;
            font-size: 11px; color: var(--accent);
            display: flex; flex-direction: column; gap: 6px;
        }
        .hud-line {
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 6px 10px; border-radius: 4px; display: inline-block;
        }

        #overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 3000; cursor: pointer; pointer-events: auto; }
        h1 { font-family: sans-serif; letter-spacing: 15px; font-weight: 100; text-shadow: 0 0 40px var(--accent); font-size: 24px; }
    </style>
</head>
<body>

<div id="star-wars-intro">
    <div class="crawl-text">MAY THE FORCE BE WITH YOU</div>
</div>

<div id="ui-layer">
    <button id="fs-btn" onclick="toggleFullScreen()">⛶</button>
    <div id="signature">
        v3.1 Release<br>
        Built with AI · <b>Shazily Munawar</b><br>
        <a href="https://www.linkedin.com/in/shazilymunawar" target="_blank" rel="noopener">LinkedIn</a>
    </div>
    
    <div id="hints">
        <div class="hint-group" id="hint-warp">
            <span class="icon">🖐️</span>WARP
        </div>
        <div class="hint-group" id="hint-retreat">
            <span class="icon">✊</span>RETREAT
        </div>
        <div class="hint-group" id="hint-steer">
            <span class="icon">👋</span>STEER
        </div>
    </div>

    <div id="hud-right">
        <div class="hud-line">STATUS: <span id="st-text" style="color:#888">OFFLINE</span></div>
        <div class="hud-line">ZOOM: <span id="wp-text" style="color:#fff">1.0x</span></div>
        <div class="hud-line">AXIS: <span id="axis-text" style="color:#aaa">X:0.0 Y:0.0</span></div>
    </div>
</div>

<div id="overlay">
    <h1>INITIALIZE</h1>
    <p style="position:absolute; bottom:45%; opacity:0.5; font-size:10px; font-family:sans-serif; letter-spacing:2px;">CLICK TO START ENGINE</p>
</div>

<video id="webcam" style="display:none;" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    // --- 0. UI SYSTEM ---
    const hintIds = ['hint-warp', 'hint-retreat', 'hint-steer'];
    let tutorialInterval = null;
    let tutorialActive = true;
    let currentHintIndex = 0;

    // Start cycling hints (Tutorial Mode)
    function startTutorial() {
        tutorialInterval = setInterval(() => {
            if(!tutorialActive) return;
            // Clear all
            hintIds.forEach(id => document.getElementById(id).classList.remove('active'));
            // Highlight next
            document.getElementById(hintIds[currentHintIndex]).classList.add('active');
            currentHintIndex = (currentHintIndex + 1) % hintIds.length;
        }, 1500);
    }

    // Stop cycling forever once user interacts
    function stopTutorial() {
        if (tutorialActive) {
            tutorialActive = false;
            clearInterval(tutorialInterval);
            // Clear all active classes so we can manually set them based on state
            hintIds.forEach(id => document.getElementById(id).classList.remove('active'));
        }
    }

    // Update UI based on current real-time state
    function updateReactiveUI(mode, isSteering) {
        // If tutorial is still active, don't override unless interaction happens
        if (tutorialActive && (mode !== 'CRUISE' || isSteering)) {
            stopTutorial();
        }

        if (!tutorialActive) {
            // Reset all
            hintIds.forEach(id => document.getElementById(id).classList.remove('active'));

            // Set Active based on State
            if (mode === 'WARP') document.getElementById('hint-warp').classList.add('active');
            if (mode === 'RETREAT') document.getElementById('hint-retreat').classList.add('active');
            if (isSteering) document.getElementById('hint-steer').classList.add('active');
        }
    }


    // --- 1. FULLSCREEN ---
    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
            document.getElementById('fs-btn').innerText = "✖";
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
                document.getElementById('fs-btn').innerText = "⛶";
            }
        }
    }
    document.addEventListener('fullscreenchange', (event) => {
        if (!document.fullscreenElement) document.getElementById('fs-btn').innerText = "⛶";
    });

    // --- 2. AUDIO ENGINE ---
    const AudioEngine = {
        ctx: null, master: null, drone: null,
        init: function() {
            window.AudioContext = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AudioContext();
            this.master = this.ctx.createGain();
            this.master.gain.value = 0.8;
            this.master.connect(this.ctx.destination);
            this.startDrone();
        },
        startDrone: function() {
            const size = this.ctx.sampleRate * 2;
            const buffer = this.ctx.createBuffer(1, size, this.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < size; i++) data[i] = (Math.random() * 2 - 1) * 3.5;
            const noise = this.ctx.createBufferSource();
            noise.buffer = buffer; noise.loop = true;
            const filter = this.ctx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.value = 80;
            const gain = this.ctx.createGain();
            gain.gain.value = 0.4;
            noise.connect(filter); filter.connect(gain); gain.connect(this.master);
            noise.start();
        },
        triggerWarp: function() {
            if(!this.ctx) return;
            const t = this.ctx.currentTime;
            const size = this.ctx.sampleRate * 1.5;
            const buffer = this.ctx.createBuffer(1, size, this.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
            const noise = this.ctx.createBufferSource();
            noise.buffer = buffer;
            const filter = this.ctx.createBiquadFilter();
            filter.type = 'bandpass'; filter.frequency.setValueAtTime(100, t);
            filter.frequency.exponentialRampToValueAtTime(800, t + 1.0);
            const gain = this.ctx.createGain();
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.5, t + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 1.2);
            noise.connect(filter); filter.connect(gain); gain.connect(this.master);
            noise.start(t);
        },
        triggerRetreat: function() {
            if(!this.ctx) return;
            const t = this.ctx.currentTime;
            const osc = this.ctx.createOscillator();
            osc.frequency.setValueAtTime(200, t);
            osc.frequency.exponentialRampToValueAtTime(50, t + 0.5);
            const gain = this.ctx.createGain();
            gain.gain.setValueAtTime(0.3, t);
            gain.gain.linearRampToValueAtTime(0, t + 0.5);
            osc.connect(gain); gain.connect(this.master);
            osc.start(t); osc.stop(t + 0.5);
        },
        triggerSwoosh: function() {
            if(!this.ctx) return;
            const t = this.ctx.currentTime;
            const size = this.ctx.sampleRate * 0.5;
            const buffer = this.ctx.createBuffer(1, size, this.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
            const noise = this.ctx.createBufferSource();
            noise.buffer = buffer;
            const filter = this.ctx.createBiquadFilter();
            filter.type = 'bandpass'; filter.frequency.value = 300;
            const gain = this.ctx.createGain();
            gain.gain.setValueAtTime(0.2, t);
            gain.gain.linearRampToValueAtTime(0, t + 0.3);
            noise.connect(filter); filter.connect(gain); gain.connect(this.master);
            noise.start(t);
        },
    };

    // --- 3. PHYSICS STATE ---
    const state = {
        count: 50000, 
        starCount: 2000, 
        rot: new THREE.Euler(0.4, 0, 0),
        angVel: new THREE.Vector2(0, 0.002), 
        tZoom: 1.0, cZoom: 1.0,
        friction: 0.98,
        sensitivity: 0.0005, 
        starSpeed: 0.005, 
        flow: true, flowSpeed: 0.002,
        mode: 'CRUISE',
        framesLost: 0,
        lastX: 0, lastY: 0
    };

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    camera.position.z = 45;

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const universe = new THREE.Group(); scene.add(universe);
    const galaxy = new THREE.Group(); universe.add(galaxy);
    const starfield = new THREE.Group(); scene.add(starfield);

    // --- 4. VISUALS ---
    let points, geometry, targets, originalHues;
    function initGalaxy(count) {
        if(points) galaxy.remove(points);
        geometry = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        targets = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);
        originalHues = new Float32Array(count);

        for(let i=0; i<count; i++) {
            const i3 = i * 3;
            let r, theta, tx, ty, tz;
            const col = new THREE.Color();
            let baseHue;

            if (i < count * 0.45) { 
                r = Math.pow(Math.random(), 2) * 8;
                const phi = Math.acos(2 * Math.random() - 1);
                theta = Math.random() * Math.PI * 2;
                tx = r * Math.sin(phi) * Math.cos(theta);
                ty = r * Math.sin(phi) * Math.sin(theta) * 0.6; 
                tz = r * Math.cos(phi);
                baseHue = 0.58; col.setHSL(baseHue, 0.1, 0.95);
            } else { 
                r = 8 + Math.random() * 20;
                theta = r * 0.45 + (i % 2 === 0 ? 0 : Math.PI);
                tx = Math.cos(theta) * r + (Math.random()-0.5)*5;
                tz = Math.sin(theta) * r + (Math.random()-0.5)*5;
                ty = (Math.random() - 0.5) * (Math.exp(-r * 0.08) * 8);
                baseHue = 0.6; col.setHSL(baseHue, 0.9, 0.5 + Math.random() * 0.2);
            }
            originalHues[i] = baseHue;
            targets[i3] = tx; targets[i3+1] = ty; targets[i3+2] = tz;
            pos[i3] = tx; pos[i3+1] = ty; pos[i3+2] = tz;
            colors[i3] = col.r; colors[i3+1] = col.g; colors[i3+2] = col.b;
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        points = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 0.13, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.8 }));
        galaxy.add(points);
    }
    initGalaxy(state.count);

    // --- 5. STARS ---
    let starPoints, starGeo, blinkOffsets;
    function initStars(count) {
        if(starPoints) starfield.remove(starPoints);
        starGeo = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);
        blinkOffsets = new Float32Array(count); 

        for(let i=0; i<count; i++) {
            const i3 = i * 3;
            const r = 20 + Math.random() * 120; 
            const theta = Math.random() * Math.PI * 2;
            pos[i3] = r * Math.cos(theta);
            pos[i3+1] = r * Math.sin(theta);
            pos[i3+2] = (Math.random() - 0.5) * 150; 
            
            const bright = 0.3 + Math.random() * 0.7;
            colors[i3] = bright; colors[i3+1] = bright; colors[i3+2] = bright;
            blinkOffsets[i] = Math.random() * Math.PI * 2;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        starGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        starPoints = new THREE.Points(starGeo, new THREE.PointsMaterial({ 
            size: 0.6, vertexColors: true, transparent: true, opacity: 0.8 
        }));
        starfield.add(starPoints);
    }
    initStars(state.starCount);

    // --- 6. CONTROL ---
    const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.85 });

    hands.onResults((res) => {
        if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
            state.framesLost = 0;
            const h = res.multiHandLandmarks[0];
            
            const cx = h[9].x; const cy = h[9].y;
            const dx = cx - state.lastX;
            const dy = cy - state.lastY;
            state.lastX = cx; state.lastY = cy;

            state.angVel.y -= dx * state.sensitivity * 100.0; 
            state.angVel.x += dy * state.sensitivity * 100.0; 

            state.angVel.x = THREE.MathUtils.clamp(state.angVel.x, -0.1, 0.1);
            state.angVel.y = THREE.MathUtils.clamp(state.angVel.y, -0.1, 0.1);

            let isSteering = false;
            if (Math.abs(dx) > 0.01 || Math.abs(dy) > 0.01) {
                AudioEngine.triggerSwoosh();
                isSteering = true;
            }

            const spread = Math.sqrt(Math.pow(h[8].x-h[0].x, 2) + Math.pow(h[8].y-h[0].y, 2));
            const prevMode = state.mode;

            if (spread < 0.18) { 
                state.mode = 'RETREAT'; 
                state.tZoom = 0.4;
                document.getElementById('st-text').innerText = "RETREAT LOCK";
                document.getElementById('st-text').style.color = "#ffaa00";
            } else if (spread > 0.40) { 
                state.mode = 'WARP'; 
                state.tZoom = 4.5;
                document.getElementById('st-text').innerText = "WARP ACTIVE";
                document.getElementById('st-text').style.color = "#00ffcc";
            } else { 
                if (state.mode !== 'RETREAT') {
                    state.mode = 'CRUISE'; 
                    state.tZoom = 1.0;
                    document.getElementById('st-text').innerText = "CRUISE";
                    document.getElementById('st-text').style.color = "#888";
                }
            }

            if (prevMode !== state.mode) {
                if (state.mode === 'WARP') AudioEngine.triggerWarp();
                if (state.mode === 'RETREAT') AudioEngine.triggerRetreat();
            }

            // UPDATE UI HIGHLIGHTS
            updateReactiveUI(state.mode, isSteering);

        } else {
            state.framesLost++;
            if (state.framesLost > 15) {
                state.mode = 'CRUISE'; 
                state.tZoom = 1.0;
                document.getElementById('st-text').innerText = "SEARCHING";
                document.getElementById('st-text').style.color = "#ff3333";
                
                // Reset UI to inactive if lost hand
                if(!tutorialActive) {
                    hintIds.forEach(id => document.getElementById(id).classList.remove('active'));
                }
                
                state.angVel.x = THREE.MathUtils.lerp(state.angVel.x, 0, 0.05); 
                state.angVel.y = THREE.MathUtils.lerp(state.angVel.y, 0.002, 0.05); 
                universe.rotation.x = THREE.MathUtils.lerp(universe.rotation.x, 0.4, 0.03); 
                universe.rotation.z = THREE.MathUtils.lerp(universe.rotation.z, 0.0, 0.03); 
            }
        }
    });

    // --- 7. ANIMATION ---
    let time = 0;
    universe.rotation.x = 0.4;

    function animate() {
        requestAnimationFrame(animate);
        time += 1;
        
        state.cZoom = THREE.MathUtils.lerp(state.cZoom, state.tZoom, 0.05);
        
        if (state.framesLost <= 15) {
            state.angVel.multiplyScalar(state.friction);
            if (Math.abs(state.angVel.y) < 0.001) state.angVel.y = 0.001; 
            universe.rotation.x += state.angVel.x; 
            universe.rotation.y += state.angVel.y;
        } else {
            universe.rotation.y += state.angVel.y; 
        }
        
        const p = geometry.attributes.position.array;
        const colors = geometry.attributes.color.array;
        const flowOffset = state.flow ? time * state.flowSpeed : 0;

        for(let i=0; i<state.count; i++) {
            const i3 = i * 3;
            const v = new THREE.Vector3(targets[i3], targets[i3+1], targets[i3+2])
                .multiplyScalar(state.cZoom);
            
            p[i3] += (v.x - p[i3]) * 0.1;
            p[i3+1] += (v.y - p[i3+1]) * 0.1;
            p[i3+2] += (v.z - p[i3+2]) * 0.1;

            if (state.flow && i % 3 === 0) { 
                const h = (originalHues[i] + flowOffset) % 1.0;
                const c = new THREE.Color().setHSL(h, 0.9, 0.5);
                colors[i3] = c.r; colors[i3+1] = c.g; colors[i3+2] = c.b;
            }
        }
        geometry.attributes.position.needsUpdate = true;
        geometry.attributes.color.needsUpdate = true;

        const zoomDelta = Math.abs(state.tZoom - state.cZoom);
        const starOpacity = THREE.MathUtils.mapLinear(state.cZoom, 1.0, 4.0, 0.8, 0.05);
        starPoints.material.opacity = THREE.MathUtils.clamp(starOpacity, 0.05, 0.8);

        const targetStarSpeed = (zoomDelta > 0.1) ? 5.0 : 0.005;
        state.starSpeed = THREE.MathUtils.lerp(state.starSpeed, targetStarSpeed, 0.1);
        
        const starPos = starGeo.attributes.position.array;
        const starCols = starGeo.attributes.color.array;
        
        for(let i=0; i<state.starCount; i++) {
            const i3 = i * 3;
            starPos[i3+2] += state.starSpeed;
            if(starPos[i3+2] > 100) starPos[i3+2] = -150;
            
            const pulse = 0.7 + 0.3 * Math.sin(time * 0.05 + blinkOffsets[i]);
            starCols[i3] = pulse; starCols[i3+1] = pulse; starCols[i3+2] = pulse;
        }
        starGeo.attributes.position.needsUpdate = true;
        starGeo.attributes.color.needsUpdate = true;

        renderer.render(scene, camera);
        
        document.getElementById('wp-text').innerText = state.cZoom.toFixed(2) + "x";
        document.getElementById('axis-text').innerText = 
            `X:${universe.rotation.x.toFixed(2)} Y:${universe.rotation.y.toFixed(2)}`;
    }

    // --- STARTUP HANDLER ---
    document.getElementById('overlay').onclick = async () => {
        document.getElementById('overlay').style.display = 'none';
        
        const intro = document.getElementById('star-wars-intro');
        intro.classList.add('active');
        setTimeout(() => { intro.classList.remove('active'); }, 4500);

        startTutorial(); // Start pulsating initially

        AudioEngine.init();
        const v = document.getElementById('webcam');
        const cam = new Camera(v, { onFrame: async () => { await hands.send({image: v}); }, width: 640, height: 480 });
        await cam.start(); 
        animate();
    };
</script>
<link rel="stylesheet" href="assets/vwk-site.css">
<script src="assets/vwk-nav.js"></script>
</body>
