<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe with Kids · Weekend Builds</title>
    <link rel="stylesheet" href="/VibewithKids/assets/vwk-theme.css">
    <link rel="stylesheet" href="/VibewithKids/assets/vwk-site.css">
    <style>
        .build-panel { display: none; }
        .build-panel.active { display: block; }
        .community-coming { padding: 2rem 1.5rem; text-align: center; }
        .community-coming p { margin: 0 0 1.25rem; font-size: 0.95rem; color: var(--vwk-paper-muted); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }
        .tile {
            display: flex; flex-direction: column;
            border-radius: 12px; background: var(--vwk-ink-raised);
            border: 2px solid var(--vwk-border-strong); overflow: hidden;
            box-shadow: var(--vwk-shadow);
            transition: transform 0.15s;
            --accent: var(--vwk-orange);
        }
        .tile:hover { transform: translate(-2px, -2px); }
        .tile-poster {
            height: 160px; background: #0f1218;
            overflow: hidden; border-bottom: 2px solid var(--vwk-border-strong);
        }
        .tile-poster img { width: 100%; height: 100%; object-fit: cover; }
        .tile-body { padding: 1rem 1.1rem; flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
        .tile-meta { display: flex; flex-wrap: wrap; gap: 0.35rem; }
        .category {
            font-family: var(--vwk-font-body); font-size: 0.62rem; font-weight: 600;
            letter-spacing: 0.06em; text-transform: uppercase;
            padding: 0.2rem 0.55rem; border-radius: 4px;
            background: rgba(255, 140, 66, 0.15); color: var(--vwk-orange);
            border: 1px solid rgba(255, 140, 66, 0.35);
        }
        .badge-desktop {
            font-family: var(--vwk-font-body); font-size: 0.55rem; font-weight: 600;
            padding: 0.2rem 0.5rem; border-radius: 4px;
            background: rgba(255, 209, 102, 0.15); color: var(--vwk-yellow);
            border: 1px solid rgba(255, 209, 102, 0.4);
        }
        .tile-title { font-family: var(--vwk-font-display); font-size: 1.15rem; font-weight: 700; }
        .tile-sub { font-size: 0.75rem; color: var(--vwk-paper-muted); }
        .tile-desc { font-size: 0.8rem; line-height: 1.5; color: var(--vwk-paper-muted); }
        .tile-actions { display: flex; gap: 0.5rem; padding: 0 1.1rem 1.1rem; }
        .tile-actions a {
            flex: 1; text-align: center; padding: 0.55rem 0.75rem; border-radius: 6px;
            font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em;
            text-transform: uppercase; text-decoration: none;
            border: 2px solid #1a1208; transition: transform 0.15s;
        }
        .btn-play { background: var(--vwk-orange); color: #1a1208; box-shadow: 3px 3px 0 rgba(0,0,0,0.3); }
        .btn-play:hover { transform: translate(-1px, -1px); }
        .btn-dl { background: var(--vwk-ink); color: var(--vwk-paper-muted); border-color: var(--vwk-border-strong); }
        .btn-dl:hover { color: var(--vwk-paper); }
        .skeleton {
            border-radius: 12px; min-height: 280px;
            background: var(--vwk-ink-raised);
            border: 2px dashed var(--vwk-border-strong);
        }
        .empty, .error { text-align: center; padding: 2rem; color: var(--vwk-paper-dim); grid-column: 1 / -1; }
    </style>
</head>
<body class="vwk-body">
    <div class="vwk-sky" aria-hidden="true"></div>
    <div class="vwk-page page">
        <div id="nav-slot"></div>
        <header class="vwk-hero hero">
            <h1 id="hero-title">Vibe with Kids</h1>
            <p class="vwk-tagline tagline" id="hero-tagline">Loading adventures...</p>
        </header>
        <div class="builds-tabs" role="tablist">
            <button class="build-tab active" role="tab" aria-selected="true" data-tab="ours">Our Builds</button>
            <button class="build-tab" role="tab" aria-selected="false" data-tab="community">Community Builds</button>
        </div>

        <div class="build-panel active" id="panel-ours" role="tabpanel">
            <main class="grid" id="grid">
                <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
            </main>
        </div>

        <div class="build-panel" id="panel-community" role="tabpanel">
            <div class="community-coming">
                <p>Coming soon — builds from parents and kids in the community.</p>
                <a class="btn-add-idea" id="add-ideas-link" href="ideas#submit">Add your ideas</a>
            </div>
        </div>

        <div id="footer-slot"></div>
    </div>
    <script src="/VibewithKids/assets/vwk-site.js"></script>
    <script>
        document.getElementById('nav-slot').innerHTML = vwkRenderNav('home');
        document.getElementById('footer-slot').innerHTML = vwkRenderFooter();
        document.getElementById('add-ideas-link').href = `${VWK.siteRoot()}ideas#submit`;

        document.querySelectorAll('.build-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.build-tab').forEach(b => {
                    b.classList.remove('active');
                    b.setAttribute('aria-selected', 'false');
                });
                document.querySelectorAll('.build-panel').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                btn.setAttribute('aria-selected', 'true');
                document.getElementById(`panel-${btn.dataset.tab}`).classList.add('active');
            });
        });

        async function loadProjects() {
            const grid = document.getElementById('grid');
            const basePath = VWK.siteRoot();
            try {
                const res = await fetch(`${basePath}projects.json`);
                if (!res.ok) throw new Error('Manifest not found');
                const data = await res.json();

                document.getElementById('hero-title').textContent = data.series || VWK.seriesName;
                document.getElementById('hero-tagline').textContent = data.tagline || '';

                if (!data.projects.length) {
                    grid.innerHTML = '<p class="empty">No projects yet — add one to projects.json!</p>';
                    return;
                }

                grid.innerHTML = data.projects.map(p => {
                    const poster = p.poster.startsWith('/') ? p.poster : `${basePath}${p.poster}`;
                    const playUrl = `${basePath}${p.slug}`;
                    const dlUrl = `${basePath}${p.file || p.slug + '.html'}`;
                    return `<article class="tile" style="--accent:${p.accent};--accent-glow:${p.accentGlow || p.accent + '55'}">
                        <div class="tile-poster"><img src="${poster}" alt="${p.title} poster" loading="lazy"></div>
                        <div class="tile-body">
                            <div class="tile-meta">
                                <span class="category">${p.category}</span>
                                ${p.desktopOnly ? '<span class="badge-desktop">Desktop + Camera</span>' : ''}
                            </div>
                            <h3 class="tile-title">${p.title}</h3>
                            ${p.subtitle ? `<p class="tile-sub">${p.subtitle}</p>` : ''}
                            <p class="tile-desc">${p.description}</p>
                        </div>
                        <div class="tile-actions">
                            <a class="btn-play" href="${playUrl}">▶ Play</a>
                            <a class="btn-dl" href="${dlUrl}" download>⬇ Download</a>
                        </div>
                    </article>`;
                }).join('');
            } catch (err) {
                grid.innerHTML = '<p class="error">Could not load projects.</p>';
                console.error(err);
            }
        }
        loadProjects();
    </script>
</body>
</html>
