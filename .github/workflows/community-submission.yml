name: Save community submission

on:
  repository_dispatch:
    types: [community-submission]

permissions:
  contents: write

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Append submission to JSON and CSV
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const submission = JSON.parse(context.payload.client_payload.data);
            const jsonPath = 'VibewithKids/community-submissions.json';
            const csvPath = 'data/submissions.csv';

            let data = { submissions: [] };
            if (fs.existsSync(jsonPath)) {
              data = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
            }
            data.submissions = data.submissions || [];
            data.submissions.unshift(submission);
            fs.writeFileSync(jsonPath, JSON.stringify(data, null, 2) + '\n');

            const esc = (v) => `"${String(v || '').replace(/"/g, '""')}"`;
            const line = [
              submission.id,
              esc(submission.type || 'idea'),
              esc(submission.name),
              esc(submission.category),
              esc(submission.author),
              esc(submission.text),
              esc(submission.prompt || ''),
              submission.submittedAt,
              submission.approved ? 'true' : 'false'
            ].join(',');

            const header = 'id,type,name,category,author,text,prompt,submittedAt,approved';
            const csv = fs.existsSync(csvPath)
              ? `${fs.readFileSync(csvPath, 'utf8').trim()}\n${line}\n`
              : `${header}\n${line}\n`;
            fs.writeFileSync(csvPath, csv);

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Add community idea from ${{ github.event.client_payload.author }}
          file_pattern: VibewithKids/community-submissions.json data/submissions.csv
